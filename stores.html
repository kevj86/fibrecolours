<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fibre Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface":                  "#121415",
              "surface-bright":           "#38393a",
              "surface-container-lowest": "#0c0e0f",
              "surface-container-low":    "#1a1c1d",
              "surface-container":        "#1e2021",
              "surface-container-high":   "#282a2b",
              "surface-container-highest":"#333536",
              "primary":                  "#adc7ff",
              "primary-container":        "#4a8eff",
              "tertiary":                 "#00daf3",
              "secondary":                "#c6c6c9",
              "on-surface":               "#e2e2e3",
              "on-surface-variant":       "#c1c6d7",
              "outline-variant":          "#414754",
            },
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  </head>
  <body class="dark antialiased bg-surface text-on-surface min-h-dvh">

    <!-- Fixed Top Nav -->
    <nav class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16"
         style="background:rgba(18,20,21,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary"
              style="font-variation-settings:'FILL' 1;font-size:22px;">settings_input_composite</span>
        <span class="font-bold tracking-tight text-on-surface text-lg">Fibre Dashboard</span>
      </div>
      <div class="hidden md:flex items-center gap-1">
        <a href="/index.html"
           class="text-secondary text-sm font-medium px-3 py-1.5 rounded-lg hover:bg-surface-container-high transition-colors">Identifier</a>
        <a href="/stores.html"
           class="text-primary text-sm font-semibold px-3 py-1.5 rounded-lg bg-surface-container-high">Inventory</a>
        <a href="/sfp.html"
           class="text-secondary text-sm font-medium px-3 py-1.5 rounded-lg hover:bg-surface-container-high transition-colors">SFP Info</a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="relative pt-24 pb-28 md:pb-16 px-6 w-full max-w-2xl mx-auto flex flex-col gap-6">

      <!-- Page Header -->
      <header class="relative z-10 flex flex-col gap-1 mt-2">
        <h1 class="text-4xl font-extrabold tracking-tight text-on-surface">Inventory</h1>
        <p class="text-sm text-secondary">Browse item codes by store category.</p>
      </header>

      <!-- Selector + List -->
      <section class="relative z-10 flex flex-col">
        <select name="display-items" id="display-items">
          <option value="ethernet"     data-button="ethernet">Ethernet</option>
          <option value="newsite"      data-button="newsite">Newsite</option>
          <option value="exchange"     data-button="exchange">Exchange</option>
          <option value="overhead"     data-button="overhead">Overhead</option>
          <option value="nodes"        data-button="nodes">Nodes</option>
          <option value="blownfibre"   data-button="blownfibre">Blown Fibre</option>
          <option value="consumables"  data-button="consumables">Consumables</option>
          <option value="tools"        data-button="tools">Tools</option>
          <option value="misc"         data-button="misc">Misc</option>
        </select>
        <div class="display-results rounded-xl overflow-hidden"
             id="display-results"
             style="background:#1a1c1d;min-height:200px;"></div>
      </section>

    </main>

    <!-- Bottom Nav (mobile only) -->
    <nav class="md:hidden fixed bottom-0 w-full z-50 rounded-t-2xl flex justify-around items-center h-20 px-4 pb-2"
         style="background:rgba(30,32,33,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 -8px 32px rgba(0,0,0,0.5);">
      <a href="/index.html"
         class="flex flex-col items-center justify-center gap-1 text-secondary opacity-60 px-4 py-1.5">
        <span class="material-symbols-outlined" style="font-size:22px;">palette</span>
        <span class="text-[11px] font-medium uppercase tracking-wide">Identifier</span>
      </a>
      <a href="/stores.html"
         class="flex flex-col items-center justify-center gap-1 text-white bg-surface-container-high rounded-xl px-4 py-1.5">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;font-size:22px;">inventory_2</span>
        <span class="text-[11px] font-semibold uppercase tracking-wide">Inventory</span>
      </a>
      <a href="/sfp.html"
         class="flex flex-col items-center justify-center gap-1 text-secondary opacity-60 px-4 py-1.5">
        <span class="material-symbols-outlined" style="font-size:22px;">settings_input_component</span>
        <span class="text-[11px] font-medium uppercase tracking-wide">SFP Info</span>
      </a>
    </nav>

    <script src="app.js" type="module"></script>
  </body>
</html>
