<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fibre Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface":                  "#121415",
              "surface-bright":           "#38393a",
              "surface-container-lowest": "#0c0e0f",
              "surface-container-low":    "#1a1c1d",
              "surface-container":        "#1e2021",
              "surface-container-high":   "#282a2b",
              "surface-container-highest":"#333536",
              "primary":                  "#adc7ff",
              "primary-container":        "#4a8eff",
              "tertiary":                 "#00daf3",
              "secondary":                "#c6c6c9",
              "on-surface":               "#e2e2e3",
              "on-surface-variant":       "#c1c6d7",
              "outline-variant":          "#414754",
            },
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  </head>
  <body class="dark antialiased bg-surface text-on-surface min-h-dvh">

    <!-- Fixed Top Nav -->
    <nav class="fixed top-0 w-full z-50 h-16"
         style="background:rgba(18,20,21,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);">
      <div class="flex items-center justify-between h-full px-6 w-full max-w-2xl mx-auto">
        <!-- Left-aligned logo -->
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined text-primary"
                style="font-variation-settings:'FILL' 1;font-size:22px;">settings_input_composite</span>
          <span class="font-bold tracking-tight text-on-surface text-lg">Fibre Dashboard</span>
        </div>

        <!-- Hamburger button -->
        <button id="menu-btn" aria-label="Open menu"
                style="width:2.5rem;height:2.5rem;display:flex;align-items:center;justify-content:center;border-radius:8px;background:transparent;border:none;cursor:pointer;color:var(--on-surface-variant);transition:background 0.15s,color 0.15s;"
                onmouseover="this.style.background='var(--surface-container-high)';this.style.color='var(--on-surface)'"
                onmouseout="this.style.background='transparent';this.style.color='var(--on-surface-variant)'">
          <span class="material-symbols-outlined" style="font-size:22px;">menu</span>
        </button>
      </div>
    </nav>

    <!-- Menu overlay -->
    <div id="menu-overlay"
         style="position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.55);opacity:0;pointer-events:none;transition:opacity 0.25s ease;backdrop-filter:blur(4px);">
    </div>

    <!-- Menu drawer (slides in from right) -->
    <div id="menu-drawer"
         style="position:fixed;top:0;right:0;bottom:0;z-index:101;width:280px;max-width:85vw;
                background:#1a1c1d;
                transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
                display:flex;flex-direction:column;padding:0;box-shadow:-8px 0 40px rgba(0,0,0,0.6);">

      <!-- Drawer header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="material-symbols-outlined text-primary"
                style="font-variation-settings:'FILL' 1;font-size:20px;">settings_input_composite</span>
          <span style="font-weight:700;font-size:0.9375rem;color:var(--on-surface);">Fibre Dashboard</span>
        </div>
        <button id="menu-close" aria-label="Close menu"
                style="width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;border-radius:6px;background:transparent;border:none;cursor:pointer;color:var(--on-surface-variant);transition:background 0.15s;">
          <span class="material-symbols-outlined" style="font-size:20px;">close</span>
        </button>
      </div>

      <!-- Divider -->
      <div style="height:1px;background:var(--outline-variant);margin:0 20px 12px;opacity:0.4;"></div>

      <!-- Nav links -->
      <nav style="padding:0 12px;display:flex;flex-direction:column;gap:4px;">
        <a href="/index.html" class="menu-link active">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">palette</span>
          Identifier
        </a>
        <a href="/stores.html" class="menu-link">
          <span class="material-symbols-outlined">inventory_2</span>
          Inventory
        </a>
        <a href="/sfp.html" class="menu-link">
          <span class="material-symbols-outlined">settings_input_component</span>
          SFP Info
        </a>
        <a href="/learning.html" class="menu-link">
          <span class="material-symbols-outlined">school</span>
          Learning Home
        </a>
        <div style="height:1px;background:var(--outline-variant);margin:8px 8px;opacity:0.4;"></div>
        <a href="/admin.html" class="menu-link">
          <span class="material-symbols-outlined">admin_panel_settings</span>
          Admin
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <main class="relative pt-[65px] pb-12 px-6 w-full max-w-2xl mx-auto flex flex-col gap-6">

      <!-- Atmospheric glow (JS updates this) -->
      <div id="glow" class="glow-blob"></div>

      <!-- Page Header -->
      <header class="relative z-10 flex flex-col gap-1 mt-2">
        <h1 class="text-4xl font-extrabold tracking-tight text-on-surface">Fibre Identifier</h1>
        <p class="text-sm text-secondary">Locate and verify physical cable strands.</p>
      </header>

      <!-- 12F / 8F Selector -->
      <div class="element-selector relative z-10">
        <div class="flex p-1 rounded-xl gap-2" style="background:#1a1c1d;">
          <div class="selector-buttons contents">
            <button id="12f" class="btn flex-1 py-3">12F</button>
            <button id="8f"  class="btn flex-1 py-3">8F</button>
          </div>
        </div>
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar relative z-10">
        <button id="tab-number" class="tab tab-active">
          <span class="material-symbols-outlined">tag</span>
          Fibre by Number
        </button>
        <button id="tab-element" class="tab">
          <span class="material-symbols-outlined">grid_view</span>
          Fibre by Element
        </button>
      </div>

      <!-- Section: Fibre by Number -->
      <section id="section-number" class="fibre-number relative z-10 flex flex-col gap-4">
        <div class="input-wrap">
          <input type="number" id="fibre-number" min="1" placeholder="00" />
          <span id="hint-number" class="input-hint"></span>
        </div>
        <div id="display-fibre"></div>
      </section>

      <!-- Section: Fibre by Element (hidden by default) -->
      <section id="section-element" class="fibre-element hidden relative z-10 flex flex-col gap-4">
        <div class="input-wrap">
          <input type="number" id="fibre-element" min="1" placeholder="00" />
          <span id="hint-element" class="input-hint"></span>
        </div>
        <div id="display-element"></div>
      </section>

      <!-- Reset -->
      <button id="reset">Reset</button>

    </main>

    <script>
      const btn = document.getElementById('menu-btn');
      const overlay = document.getElementById('menu-overlay');
      const drawer = document.getElementById('menu-drawer');
      const closeBtn = document.getElementById('menu-close');

      function openMenu() {
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'auto';
        drawer.style.transform = 'translateX(0)';
      }
      function closeMenu() {
        overlay.style.opacity = '0';
        overlay.style.pointerEvents = 'none';
        drawer.style.transform = 'translateX(100%)';
      }

      btn.addEventListener('click', openMenu);
      closeBtn.addEventListener('click', closeMenu);
      overlay.addEventListener('click', closeMenu);
    </script>

    <script src="app.js" type="module"></script>
  </body>
</html>
